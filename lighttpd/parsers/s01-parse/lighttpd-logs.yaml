filter: "evt.Parsed.program startsWith 'lighttpd'"
onsuccess: next_stage
name: kab01m/lighttpd-logs
description: "Parse lighttpd access and error logs (modified)"
nodes:
  - grok:
      pattern: '%{IPORHOST:remote_addr} (%{IPORHOST:target_fqdn}(:%{INT:port})? )?(%{LHUSER:remote_user} )?\[%{HTTPDATE:time_local}\] "%{WORD:verb} %{DATA:request} HTTP/%{NUMBER:http_version}" %{NUMBER:status} %{NUMBER:body_bytes_sent} "%{LHNOTDQUOTE:http_referer}" "%{LHNOTDQUOTE:http_user_agent}"'
      apply_on: message
      statics:
        - meta: log_type
          value: http_access-log
        - target: evt.StrTime
          expression: evt.Parsed.time_local
  - grok:
      # and this one the error log
      pattern: '%{LHERRTIME:time}: (\(%{LHSRC:source}\) )?%{GREEDYDATA:message}( \(%{IPORHOST}\))?'
      apply_on: message
      statics:
        - meta: log_type
          value: http_error-log
        - target: evt.StrTime
          expression: evt.Parsed.time
    pattern_syntax:
      NO_DOUBLE_QUOTE: '[^"]+'
    onsuccess: next_stage
  ## Parse malformed requests
  - grok:
      pattern: '%{IPORHOST:remote_addr} (%{IPORHOST:target_fqdn}(:%{INT:port})? )?(%{LHUSER:remote_user} )?\[%{HTTPDATE:time_local}\] "%{DATA:request}" %{NUMBER:status} %{NUMBER:body_bytes_sent} "%{LHNOTDQUOTE:http_referer}" "%{LHNOTDQUOTE:http_user_agent}"'
      apply_on: message
    statics:
      - meta: log_type
        value: http_access-log
      - target: evt.StrTime
        expression: evt.Parsed.time_local
    # these ones apply for both grok patterns
statics:
  - meta: service
    value: http
  - meta: source_ip
    expression: "evt.Parsed.remote_addr"
  - meta: http_status
    expression: "evt.Parsed.status"
  - meta: http_path
    expression: "evt.Parsed.request"
  - meta: http_verb
    expression: "evt.Parsed.verb"
  - meta: http_user_agent
    expression: "evt.Parsed.http_user_agent"
  - meta: target_fqdn
    expression: "evt.Parsed.target_fqdn"
